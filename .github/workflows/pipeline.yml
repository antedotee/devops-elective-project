# Full stack on AWS: Terraform → ALB routes / → SPA (ECS + nginx), /api* → API (ECS + Node).
# CI builds/pushes both images to ECR and rolls out both ECS services (same pattern as backend-only flow).

# === GitHub Secrets (Actions → Secrets) ===
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN, AWS_REGION
#
# Remote state bucket (created automatically): shopsmart-tf-<github.repository_id>

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Prepare report directories
        run: mkdir -p server/reports client/reports

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests (JUnit report)
        working-directory: server
        run: npm test

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client unit and integration tests (Vitest JSON report)
        working-directory: client
        run: npm run test

      - name: Upload test reports (Phase 1 artifacts)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          retention-days: 30
          if-no-files-found: warn
          path: |
            server/reports/
            client/reports/

  terraform:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      ecs_cluster_name: ${{ steps.tf_outputs.outputs.ecs_cluster_name }}
      ecs_service_name: ${{ steps.tf_outputs.outputs.ecs_service_name }}
      ecs_web_service_name: ${{ steps.tf_outputs.outputs.ecs_web_service_name }}
      ecs_task_execution_role_arn: ${{ steps.tf_outputs.outputs.ecs_task_execution_role_arn }}
      health_check_url: ${{ steps.tf_outputs.outputs.health_check_url }}
      app_public_url: ${{ steps.tf_outputs.outputs.app_public_url }}
    defaults:
      run:
        working-directory: terraform

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET_NAME: shopsmart-tf-${{ github.repository_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Ensure Terraform state S3 bucket exists
        run: |
          set -euo pipefail
          echo "State bucket: ${TF_STATE_BUCKET_NAME}"
          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET_NAME}" 2>/dev/null; then
            echo "Bucket already exists."
          else
            echo "Creating bucket..."
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET_NAME}" --region "${AWS_REGION}"
            else
              aws s3api create-bucket --bucket "${TF_STATE_BUCKET_NAME}" --region "${AWS_REGION}" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
            aws s3api put-public-access-block \
              --bucket "${TF_STATE_BUCKET_NAME}" \
              --public-access-block-configuration \
              "BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true"
            aws s3api put-bucket-versioning \
              --bucket "${TF_STATE_BUCKET_NAME}" \
              --versioning-configuration Status=Enabled
          fi

      - name: Terraform Init (S3 backend)
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET_NAME}" \
            -backend-config="key=shopsmart/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_outputs
        if: success()
        run: |
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
          echo "ecs_service_name=$(terraform output -raw ecs_service_name 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
          echo "ecs_web_service_name=$(terraform output -raw ecs_web_service_name 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
          echo "ecs_task_execution_role_arn=$(terraform output -raw ecs_task_execution_role_arn 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
          echo "health_check_url=$(terraform output -raw health_check_url 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"
          echo "app_public_url=$(terraform output -raw app_public_url 2>/dev/null || echo "")" >> "$GITHUB_OUTPUT"

      - name: Print app URL
        if: success()
        run: |
          terraform output -no-color app_public_url 2>/dev/null || true
          terraform output -no-color health_check_url 2>/dev/null || true

  deploy-ecs-fargate:
    name: Build/push ECR images and deploy API + web to ECS
    needs: terraform
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Terraform outputs
        env:
          ECS_CLUSTER: ${{ needs.terraform.outputs.ecs_cluster_name }}
          ECS_API: ${{ needs.terraform.outputs.ecs_service_name }}
          ECS_WEB: ${{ needs.terraform.outputs.ecs_web_service_name }}
          EXEC_ROLE: ${{ needs.terraform.outputs.ecs_task_execution_role_arn }}
        run: |
          test -n "${ECS_CLUSTER}" && test -n "${ECS_API}" && test -n "${ECS_WEB}" && test -n "${EXEC_ROLE}"

      - name: Prepare ECS task definitions
        run: sed -i "s|EXECUTION_ROLE_ARN_SUBSTITUTE|${ECS_TASK_EXECUTION_ROLE_ARN}|g" ecs-task-def.json ecs-task-def-frontend.json
        env:
          ECS_TASK_EXECUTION_ROLE_ARN: ${{ needs.terraform.outputs.ecs_task_execution_role_arn }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/shopsmart-server:latest
            ${{ steps.login-ecr.outputs.registry }}/shopsmart-server:${{ github.sha }}

      - name: Render API task definition
        id: render-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-def.json
          container-name: shopsmart-server
          image: ${{ steps.login-ecr.outputs.registry }}/shopsmart-server:${{ github.sha }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api.outputs.task-definition }}
          cluster: ${{ needs.terraform.outputs.ecs_cluster_name }}
          service: ${{ needs.terraform.outputs.ecs_service_name }}
          wait-for-service-stability: true

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/shopsmart-client:latest
            ${{ steps.login-ecr.outputs.registry }}/shopsmart-client:${{ github.sha }}

      - name: Render web task definition
        id: render-web
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-def-frontend.json
          container-name: shopsmart-client
          image: ${{ steps.login-ecr.outputs.registry }}/shopsmart-client:${{ github.sha }}

      - name: Deploy web service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-web.outputs.task-definition }}
          cluster: ${{ needs.terraform.outputs.ecs_cluster_name }}
          service: ${{ needs.terraform.outputs.ecs_web_service_name }}
          wait-for-service-stability: true

      - name: Verify API health via ALB
        env:
          HEALTH_URL: ${{ needs.terraform.outputs.health_check_url }}
        run: |
          test -n "${HEALTH_URL}"
          curl -fsS --retry 10 --retry-delay 10 "${HEALTH_URL}"
