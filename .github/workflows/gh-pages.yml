# Frontend on GitHub Pages (HTTPS). Set Actions variable VITE_API_BASE_URL to Terraform output
# api_https_base_url (HTTPS CloudFront URL from terraform/), no trailing slash — required so the
# browser is not blocked by mixed-content rules when calling the API.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Warn if API base URL is unset
        if: ${{ vars.VITE_API_BASE_URL == '' }}
        run: |
          echo "::warning::Set Actions variable VITE_API_BASE_URL to Terraform output api_https_base_url (CloudFront HTTPS URL). Otherwise API calls from Pages will fail."

      - name: Build client for GitHub Pages
        working-directory: client
        env:
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm ci && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
